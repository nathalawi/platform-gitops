apiVersion: v1
kind: Service
metadata:
  name: coredns-local
  namespace: local-dns
spec:
  selector:
    app: coredns-local
  ports:
    - name: dns-udp
      protocol: UDP
      port: 53
      targetPort: 53
    - name: dns-tcp
      protocol: TCP
      port: 53
      targetPort: 53
  type: ClusterIP