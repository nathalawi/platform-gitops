provider: fake

sources:
  - service
  - ingress
  - gateway-httproute

replicaCount: 1
resources:
  requests:
    cpu: 50m
    memory: 64Mi

tolerations:
- key: node-role.kubernetes.io/control-plane
  operator: Exists
  effect: NoSchedule

extraArgs:
  - --log-level=info
  - --txt-owner-id=kind-platform-demo

policy: sync
registry: txt